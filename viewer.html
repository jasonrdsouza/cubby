<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Key}} — Cubby</title>
    <link rel="stylesheet" href="/vendor/rainbow.min.css">
    <style>
    body{
      max-width:900px;
      margin:40px auto;
      padding:0 10px;
      font:18px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      color:#444
    }
    h1,h2,h3{
      line-height:1.2
    }
    .viewer-header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:20px;
      padding-bottom:10px;
      border-bottom:1px solid #30363d
    }
    .viewer-header h1{
      margin:0;
      font-size:1.4em
    }
    .viewer-meta{
      font-size:0.8em;
      color:#8b949e
    }
    .viewer-actions a{
      display:inline-block;
      padding:6px 14px;
      border:1px solid #30363d;
      border-radius:4px;
      text-decoration:none;
      font-size:0.85em;
      margin-left:8px
    }
    #content{
      min-height:100px
    }
    #content pre{
      padding:16px;
      border-radius:6px;
      overflow-x:auto;
      background:#161b22
    }
    #content table{
      border-collapse:collapse;
      width:100%
    }
    #content th, #content td{
      border:1px solid #30363d;
      padding:8px 12px;
      text-align:left
    }
    #content th{
      background:#161b22
    }
    #content img{
      max-width:100%;
      height:auto;
      border-radius:6px
    }
    @media (prefers-color-scheme: dark){
      body{
        color:#c9d1d9;
        background:#0d1117
      }
      a:link{
        color:#58a6ff
      }
      a:visited{
        color:#8e96f0
      }
    }
    @media (prefers-color-scheme: light){
      #content pre{
        background:#f6f8fa
      }
      #content th{
        background:#f6f8fa
      }
      #content th, #content td{
        border-color:#d0d7de
      }
      .viewer-header{
        border-bottom-color:#d0d7de
      }
    }
    </style>
  </head>
  <body>
    <div class="viewer-header">
      <div>
        <h1>{{.Key}}</h1>
        <div class="viewer-meta">{{.ContentType}} · Updated {{.UpdatedAt}} · <a href="https://github.com/jasonrdsouza/cubby/commit/{{.Version}}">{{.ShortVersion}}</a></div>
      </div>
      <div class="viewer-actions">
        <a href="/">← Index</a>
        <a href="{{.Key}}?raw">View Raw</a>
      </div>
    </div>
    <div id="content"></div>

    <script src="/vendor/marked.min.js"></script>
    <script src="/vendor/highlight.min.js"></script>
    <script>
    (function() {
      var contentType = "{{.ContentType}}";
      var isImage = {{.IsImage}};
      var key = "{{.Key}}";
      var container = document.getElementById('content');

      if (isImage) {
        var img = document.createElement('img');
        img.src = '/' + key + '?raw';
        img.alt = key;
        container.appendChild(img);
        return;
      }

      var raw = atob("{{.ContentBase64}}");
      var ct = contentType.split(';')[0].trim();

      if (ct === 'text/markdown') {
        marked.setOptions({
          highlight: function(code, lang) {
            if (lang && hljs.getLanguage(lang)) {
              return hljs.highlight(code, {language: lang}).value;
            }
            return hljs.highlightAuto(code).value;
          }
        });
        container.innerHTML = marked.parse(raw);
      } else if (ct === 'application/json') {
        try {
          var formatted = JSON.stringify(JSON.parse(raw), null, 2);
          var pre = document.createElement('pre');
          var code = document.createElement('code');
          code.className = 'language-json';
          code.textContent = formatted;
          pre.appendChild(code);
          container.appendChild(pre);
          hljs.highlightElement(code);
        } catch(e) {
          var pre = document.createElement('pre');
          pre.textContent = raw;
          container.appendChild(pre);
        }
      } else if (ct === 'text/csv') {
        var table = document.createElement('table');
        var lines = raw.split('\n').filter(function(l) { return l.trim() !== ''; });
        lines.forEach(function(line, i) {
          var row = document.createElement('tr');
          // Simple CSV parsing: split on commas, handle quoted fields
          var cells = [];
          var current = '';
          var inQuotes = false;
          for (var c = 0; c < line.length; c++) {
            var ch = line[c];
            if (ch === '"') {
              inQuotes = !inQuotes;
            } else if (ch === ',' && !inQuotes) {
              cells.push(current);
              current = '';
            } else {
              current += ch;
            }
          }
          cells.push(current);
          cells.forEach(function(cell) {
            var el = document.createElement(i === 0 ? 'th' : 'td');
            el.textContent = cell.trim();
            row.appendChild(el);
          });
          table.appendChild(row);
        });
        container.appendChild(table);
      } else {
        // text/plain fallback
        var pre = document.createElement('pre');
        pre.textContent = raw;
        container.appendChild(pre);
      }
    })();
    </script>
  </body>
</html>
