<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cubby Server</title>
    <style>
    body{
      max-width:650px;
      margin:40px auto;
      padding:0 10px;
      font:18px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      color:#444
    }
    h1,h2,h3{
      line-height:1.2
    }
    p{
      text-align: center;
    }
    footer{
      text-align: right;
    }
    .upload-container {
        border: 2px dashed #ccc;
        border-radius: 4px;
        padding: 20px;
        text-align: center;
        margin: 20px 0;
      }
      .upload-button {
        background: #0366d6;
        color: white;
        padding: 10px 20px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 10px;
      }
      #status {
        margin-top: 20px;
        padding: 10px;
      }
    @media (prefers-color-scheme: dark){
      body{
        color:#c9d1d9;
        background:#0d1117
      }
      a:link{
        color:#58a6ff
      }
      a:visited{
        color:#8e96f0
      }
    }
    </style>
  </head>
  <body>
    <h1>Occupied Cubbies</h1>

    <ul>
    {{range .Keys}}
        <li><a href="{{.}}">{{.}}</a></li>
    {{else}}
      <div><strong>No entries</strong></div>
    {{end}}
    </ul>

    <h2>Add to Cubby</h2>

    <div class="upload-container">
      <form id="uploadForm">
        <div>
          <label for="key">Key:</label>
          <input type="text" id="key" name="key" required>
        </div>
        <div>
          <label for="access">Access:</label>
          <label><input type="radio" name="accessType" value="public" checked> Public</label>
          <label><input type="radio" name="accessType" value="user"> Private</label>
        </div>
        <div>
          <label for="contentType">Content Type:</label>
          <input type="text" id="contentType" name="contentType" list="contentTypes" placeholder="e.g. text/plain, application/json">
          <datalist id="contentTypes">
            <option value="text/plain">
            <option value="text/html">
            <option value="text/css">
            <option value="text/csv">
            <option value="text/markdown">
            <option value="text/cubbydoc">
            <option value="text/x-diff">
            <option value="text/x-mermaid">
            <option value="text/x-python">
            <option value="text/x-go">
            <option value="text/x-rust">
            <option value="text/x-java">
            <option value="text/x-c">
            <option value="text/x-c++">
            <option value="text/x-ruby">
            <option value="text/x-shellscript">
            <option value="text/x-sql">
            <option value="text/x-yaml">
            <option value="text/x-toml">
            <option value="text/typescript">
            <option value="application/json">
            <option value="application/javascript">
            <option value="application/pdf">
            <option value="application/xml">
            <option value="application/zip">
            <option value="application/octet-stream">
            <option value="image/png">
            <option value="image/jpeg">
            <option value="image/gif">
            <option value="image/svg+xml">
            <option value="image/webp">
            <option value="audio/mpeg">
            <option value="video/mp4">
          </datalist>
        </div>
        <div>
          <label><input type="radio" name="uploadType" value="file" checked> Upload File</label>
          <label><input type="radio" name="uploadType" value="text"> Enter Text</label>
        </div>
        <div id="fileInputDiv">
          <input type="file" id="fileInput">
        </div>
        <div id="textInputDiv" style="display: none;">
          <textarea id="textInput" rows="4" cols="50"></textarea>
        </div>
        <button type="submit" class="upload-button">Upload</button>
      </form>
    </div>

    <div id="status"></div>

    <script>
      const form = document.getElementById('uploadForm');
      const fileInputDiv = document.getElementById('fileInputDiv');
      const textInputDiv = document.getElementById('textInputDiv');

      form.querySelectorAll('input[name="uploadType"]').forEach(radio => {
        radio.addEventListener('change', (e) => {
          console.log("uploadType changed");
          if (e.target.value === 'file') {
            fileInputDiv.style.display = 'block';
            textInputDiv.style.display = 'none';
          } else {
            fileInputDiv.style.display = 'none';
            textInputDiv.style.display = 'block';
          }
        })
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const statusDiv = document.getElementById('status');
        const key = document.getElementById('key').value;
        const uploadType = form.querySelector('input[name="uploadType"]:checked').value;
        const specifiedContentType = document.getElementById('contentType').value;
        const accessType = form.querySelector('input[name="accessType"]:checked').value;

        let content;
        if (uploadType === 'file') {
          content = document.getElementById('fileInput').files[0];
          if (!content) {
            statusDiv.textContent = 'Please select a file';
            return;
          }
        } else {
          content = document.getElementById('textInput').value;
          if (!content) {
            statusDiv.textContent = 'Please enter some text';
            return;
          }
        }

        const inferredContentType =  specifiedContentType || (uploadType === 'file' ? content.type : 'text/plain');

        if (!key) {
          statusDiv.textContent = 'Please provide a key';
          return;
        }

        try {
          const response = await fetch(`/${key}`, {
            method: 'POST',
            body: content,
            headers: {
              'Content-Type': inferredContentType,
              'X-Cubby-Readers': accessType,
            }
          });

          if (response.ok) {
            statusDiv.textContent = `Successfully uploaded to key: ${key}`;
            form.reset();
          } else {
            statusDiv.textContent = `Upload failed: ${response.statusText}`;
          }
        } catch (error) {
          statusDiv.textContent = `Error: ${error.message}`;
        }
      });
    </script>

    <p>-----</p>
    <footer>Version: <a href="https://github.com/jasonrdsouza/cubby/commit/{{.Version}}">{{ .ShortVersion }}</a></footer>
  </body>
</html>
